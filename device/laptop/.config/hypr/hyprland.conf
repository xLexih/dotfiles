# monitor = HDMI-A-2,1920x1080@144.01,0x0,1
# monitor = eDP-1, 2560x1600@240.00,0x0,1.6666666
# including the bitdepth 10 makes it all stop working~
monitor = eDP-1, 2560x1600@240.00, 0x0, 1.33, cm, auto
# monitor = eDP-1, 2560x1600@240.00, 0x0, 1.3333333, bitdepth, 10, cm, auto
# monitor = eDP-1, 2560x1600@240.00, 0x0, 1.600000, bitdepth, 10, cm, auto
env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card2

env = XCURSOR_SIZE,21
env = HYPRCURSOR_SIZE,21
misc {
    vrr = 1 # on for all
}

exec-once = ./monitor.sh